// Kontroller Database Format

syntax = "proto3";

package kurrent.kontrol_plane.cluster_state;

option csharp_namespace = "KurrentDB.KontrolPlane.StateMachine";

// Represents entire state of the Kontroller internal database
message ClusterState
{
  uint64 version = 1;
  map<string, Database> Databases = 2;
}

message Database
{
  uint64 version = 1;
  string description = 2;
  uint64 epoch = 3;
  repeated DatabaseNode Nodes = 4;
  bytes leaderAddress = 5;
}

message DatabaseNode
{
  uint64 version = 1;
  bytes address = 2;
  bool isReadOnlyReplica = 3;
}
