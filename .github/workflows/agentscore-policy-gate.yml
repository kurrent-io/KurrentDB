name: AgentScore Policy Gate

on:
  pull_request:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  mcp-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Thezenmonster/mcp-verdict-action@v1
        with:
          packages: "@upstash/context7-mcp,@modelcontextprotocol/server-sequential-thinking"
          fail-on: block
